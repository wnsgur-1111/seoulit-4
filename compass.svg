<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">

  <!-- ============ 나침반 1 : 좌상단, 골드, 느리게 떠다님 ============ -->
  <g opacity="0.16">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="180,180; 230,140; 150,210; 180,180"
        keyTimes="0;0.33;0.66;1"
        dur="38s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="130" fill="none" stroke="#e8b959" stroke-width="1"/>
      <circle r="102" fill="none" stroke="#e8b959" stroke-width="0.5" stroke-dasharray="1 7"/>

      <g stroke="#e8b959" stroke-width="1.5" stroke-linecap="round">
        <line x1="0" y1="-130" x2="0" y2="-113"/>
        <line x1="0" y1="130" x2="0" y2="113"/>
        <line x1="-130" y1="0" x2="-113" y2="0"/>
        <line x1="130" y1="0" x2="113" y2="0"/>
      </g>
      <g stroke="#e8b959" stroke-width="0.75" opacity="0.6">
        <line x1="-92" y1="-92" x2="-80" y2="-80"/>
        <line x1="92" y1="-92" x2="80" y2="-80"/>
        <line x1="-92" y1="92" x2="-80" y2="80"/>
        <line x1="92" y1="92" x2="80" y2="80"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0;360" dur="54s" repeatCount="indefinite"/>
        <polygon points="0,-86 9,0 0,86 -9,0" fill="#e8b959"/>
        <circle r="7" fill="#12121a" stroke="#e8b959" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ============ 나침반 2 : 우하단, 바이올렛, 반대로 떠다님 ============ -->
  <g opacity="0.14">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="1330,660; 1280,700; 1370,630; 1330,660"
        keyTimes="0;0.33;0.66;1"
        dur="44s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="150" fill="none" stroke="#8f82c9" stroke-width="1"/>
      <circle r="118" fill="none" stroke="#8f82c9" stroke-width="0.5" stroke-dasharray="1 8"/>

      <g stroke="#8f82c9" stroke-width="1.5" stroke-linecap="round">
        <line x1="0" y1="-150" x2="0" y2="-131"/>
        <line x1="0" y1="150" x2="0" y2="131"/>
        <line x1="-150" y1="0" x2="-131" y2="0"/>
        <line x1="150" y1="0" x2="131" y2="0"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="360;0" dur="70s" repeatCount="indefinite"/>
        <polygon points="0,-100 10,0 0,100 -10,0" fill="#8f82c9"/>
        <circle r="8" fill="#12121a" stroke="#8f82c9" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ============ 나침반 3 : 화면 중앙 상단, 작고 흐릿, 틸 ============ -->
  <g opacity="0.12">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="820,120; 860,160; 790,100; 820,120"
        keyTimes="0;0.33;0.66;1"
        dur="30s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="60" fill="none" stroke="#5fb3ac" stroke-width="1"/>
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0;360" dur="26s" repeatCount="indefinite"/>
        <polygon points="0,-42 5,0 0,42 -5,0" fill="#5fb3ac"/>
        <circle r="4" fill="#12121a" stroke="#5fb3ac" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- ============ 떠다니는 작은 나침반 바늘 (경로 따라 이동) ============ -->
  <g opacity="0.22" fill="#e8b959">
    <g>
      <animateMotion dur="46s" repeatCount="indefinite" rotate="auto"
        path="M 200,780 C 500,700 700,850 1000,760 C 1250,690 1400,780 1500,700"/>
      <polygon points="0,-14 4,0 0,14 -4,0"/>
    </g>
  </g>

  <g opacity="0.18" fill="#cf7288">
    <g>
      <animateMotion dur="52s" repeatCount="indefinite" rotate="auto" begin="-8s"
        path="M 1450,180 C 1200,260 1000,120 700,220 C 450,300 300,180 150,260"/>
      <polygon points="0,-11 3.5,0 0,11 -3.5,0"/>
    </g>
  </g>

  <!-- ============ 초침처럼 도는 바늘 : 우상단 ============ -->
  <g transform="translate(1420,150)" opacity="0.2">
    <circle r="3" fill="#cf7288"/>
    <circle r="46" fill="none" stroke="#cf7288" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;360" dur="9s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#cf7288" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ 초침처럼 도는 바늘 : 좌하단 ============ -->
  <g transform="translate(140,760)" opacity="0.18">
    <circle r="3" fill="#5fb3ac"/>
    <circle r="38" fill="none" stroke="#5fb3ac" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="360;0" dur="7s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-36" stroke="#5fb3ac" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ 초침 : 화면 중앙 우측, 아주 은은하게 ============ -->
  <g transform="translate(1100,480)" opacity="0.13">
    <circle r="2.5" fill="#e8b959"/>
    <circle r="30" fill="none" stroke="#e8b959" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;360" dur="11s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#e8b959" stroke-width="1" stroke-linecap="round"/>
    </g>
  </g>

</svg>
