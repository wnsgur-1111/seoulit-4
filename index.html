<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내면 나침반 — 성격유형 검사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-noise"></div>
<svg class="bg-compass" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">

  <!-- ============ 나침반 1 : 좌상단, 골드, 느리게 떠다님 ============ -->
  <g opacity="0.16">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="180,180; 230,140; 150,210; 180,180"
        keyTimes="0;0.33;0.66;1"
        dur="38s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="130" fill="none" stroke="#e8b959" stroke-width="1"/>
      <circle r="102" fill="none" stroke="#e8b959" stroke-width="0.5" stroke-dasharray="1 7"/>

      <g stroke="#e8b959" stroke-width="1.5" stroke-linecap="round">
        <line x1="0" y1="-130" x2="0" y2="-113"/>
        <line x1="0" y1="130" x2="0" y2="113"/>
        <line x1="-130" y1="0" x2="-113" y2="0"/>
        <line x1="130" y1="0" x2="113" y2="0"/>
      </g>
      <g stroke="#e8b959" stroke-width="0.75" opacity="0.6">
        <line x1="-92" y1="-92" x2="-80" y2="-80"/>
        <line x1="92" y1="-92" x2="80" y2="-80"/>
        <line x1="-92" y1="92" x2="-80" y2="80"/>
        <line x1="92" y1="92" x2="80" y2="80"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0;360" dur="54s" repeatCount="indefinite"/>
        <polygon points="0,-86 9,0 0,86 -9,0" fill="#e8b959"/>
        <circle r="7" fill="#12121a" stroke="#e8b959" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ============ 나침반 2 : 우하단, 바이올렛, 반대로 떠다님 ============ -->
  <g opacity="0.14">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="1330,660; 1280,700; 1370,630; 1330,660"
        keyTimes="0;0.33;0.66;1"
        dur="44s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="150" fill="none" stroke="#8f82c9" stroke-width="1"/>
      <circle r="118" fill="none" stroke="#8f82c9" stroke-width="0.5" stroke-dasharray="1 8"/>

      <g stroke="#8f82c9" stroke-width="1.5" stroke-linecap="round">
        <line x1="0" y1="-150" x2="0" y2="-131"/>
        <line x1="0" y1="150" x2="0" y2="131"/>
        <line x1="-150" y1="0" x2="-131" y2="0"/>
        <line x1="150" y1="0" x2="131" y2="0"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="360;0" dur="70s" repeatCount="indefinite"/>
        <polygon points="0,-100 10,0 0,100 -10,0" fill="#8f82c9"/>
        <circle r="8" fill="#12121a" stroke="#8f82c9" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ============ 나침반 3 : 화면 중앙 상단, 작고 흐릿, 틸 ============ -->
  <g opacity="0.12">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="820,120; 860,160; 790,100; 820,120"
        keyTimes="0;0.33;0.66;1"
        dur="30s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <circle r="60" fill="none" stroke="#5fb3ac" stroke-width="1"/>
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0;360" dur="26s" repeatCount="indefinite"/>
        <polygon points="0,-42 5,0 0,42 -5,0" fill="#5fb3ac"/>
        <circle r="4" fill="#12121a" stroke="#5fb3ac" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- ============ 떠다니는 작은 나침반 바늘 (경로 따라 이동) ============ -->
  <g opacity="0.22" fill="#e8b959">
    <g>
      <animateMotion dur="46s" repeatCount="indefinite" rotate="auto"
        path="M 200,780 C 500,700 700,850 1000,760 C 1250,690 1400,780 1500,700"/>
      <polygon points="0,-14 4,0 0,14 -4,0"/>
    </g>
  </g>

  <g opacity="0.18" fill="#cf7288">
    <g>
      <animateMotion dur="52s" repeatCount="indefinite" rotate="auto" begin="-8s"
        path="M 1450,180 C 1200,260 1000,120 700,220 C 450,300 300,180 150,260"/>
      <polygon points="0,-11 3.5,0 0,11 -3.5,0"/>
    </g>
  </g>

  <!-- ============ 초침처럼 도는 바늘 : 우상단 ============ -->
  <g transform="translate(1420,150)" opacity="0.2">
    <circle r="3" fill="#cf7288"/>
    <circle r="46" fill="none" stroke="#cf7288" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;360" dur="9s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#cf7288" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ 초침처럼 도는 바늘 : 좌하단 ============ -->
  <g transform="translate(140,760)" opacity="0.18">
    <circle r="3" fill="#5fb3ac"/>
    <circle r="38" fill="none" stroke="#5fb3ac" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="360;0" dur="7s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-36" stroke="#5fb3ac" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============ 초침 : 화면 중앙 우측, 아주 은은하게 ============ -->
  <g transform="translate(1100,480)" opacity="0.13">
    <circle r="2.5" fill="#e8b959"/>
    <circle r="30" fill="none" stroke="#e8b959" stroke-width="0.5" opacity="0.4"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;360" dur="11s" repeatCount="indefinite"/>
      <line x1="0" y1="0" x2="0" y2="-28" stroke="#e8b959" stroke-width="1" stroke-linecap="round"/>
    </g>
  </g>

</svg>

<!-- ===== 인트로 화면 ===== -->
<section id="screen-intro" class="screen active">
  <div class="intro-wrap">
    <span class="eyebrow">내면 나침반</span>
    <h1 class="hero-title">당신 안에는<br><em>네 개의 바늘</em>이 있습니다.</h1>
    <p class="hero-desc">에너지의 방향, 정보를 대하는 방식, 결정을 내리는 기준, 삶을 살아가는 태도.<br>
    20개의 질문으로 네 개의 축이 어디를 가리키는지 확인해보세요.</p>

    <div class="axis-preview">
      <div class="axis-preview-row"><span class="letter">E</span><div class="track"><div class="fill" style="width:50%"></div></div><span class="letter">I</span></div>
      <div class="axis-preview-row"><span class="letter">S</span><div class="track"><div class="fill" style="width:50%"></div></div><span class="letter">N</span></div>
      <div class="axis-preview-row"><span class="letter">T</span><div class="track"><div class="fill" style="width:50%"></div></div><span class="letter">F</span></div>
      <div class="axis-preview-row"><span class="letter">J</span><div class="track"><div class="fill" style="width:50%"></div></div><span class="letter">P</span></div>
    </div>

    <button id="btn-start" class="btn-primary">검사 시작하기</button>
    <span class="meta-note">약 3분 소요 · 20문항 · 결과는 저장되지 않습니다</span>
  </div>
</section>

<!-- ===== 질문 화면 ===== -->
<section id="screen-quiz" class="screen">
  <div class="quiz-gauges">
    <div class="gauge" data-axis="EI"><span class="g-label left">E</span><div class="g-track"><div class="g-fill" id="fill-EI"></div></div><span class="g-label right">I</span></div>
    <div class="gauge" data-axis="SN"><span class="g-label left">S</span><div class="g-track"><div class="g-fill" id="fill-SN"></div></div><span class="g-label right">N</span></div>
    <div class="gauge" data-axis="TF"><span class="g-label left">T</span><div class="g-track"><div class="g-fill" id="fill-TF"></div></div><span class="g-label right">F</span></div>
    <div class="gauge" data-axis="JP"><span class="g-label left">J</span><div class="g-track"><div class="g-fill" id="fill-JP"></div></div><span class="g-label right">P</span></div>
  </div>

  <div class="quiz-wrap">
    <span class="q-count"><span id="q-current">1</span> / <span id="q-total">20</span></span>
    <h2 id="q-text" class="q-text">질문이 여기에 표시됩니다</h2>
    <div class="options">
      <button class="option" id="opt-a" data-choice="a">
        <span class="opt-mark">A</span>
        <span class="opt-text" id="opt-a-text"></span>
      </button>
      <button class="option" id="opt-b" data-choice="b">
        <span class="opt-mark">B</span>
        <span class="opt-text" id="opt-b-text"></span>
      </button>
    </div>
    <button id="btn-back" class="btn-ghost">← 이전 질문</button>
  </div>
</section>

<!-- ===== 결과 화면 ===== -->
<section id="screen-result" class="screen">
  <div class="result-wrap">
    <span class="eyebrow">당신의 나침반이 가리키는 곳</span>
    <div class="result-type-row">
      <span class="result-type" id="result-type">INFP</span>
    </div>
    <h2 class="result-name" id="result-name">유형 이름</h2>

    <div class="result-axes" id="result-axes"></div>

    <p class="result-desc" id="result-desc"></p>

    <div class="result-traits">
      <div class="trait-block">
        <h3>강점</h3>
        <ul id="result-strengths"></ul>
      </div>
      <div class="trait-block">
        <h3>주의할 점</h3>
        <ul id="result-watch"></ul>
      </div>
    </div>

    <button id="btn-restart" class="btn-primary">다시 검사하기</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
